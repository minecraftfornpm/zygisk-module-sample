name: Build Zygisk Module

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_PATH

    - name: Build with ndk-build
      run: |
        cd module
        $ANDROID_NDK_HOME/ndk-build

    - name: Prepare module zip
      run: |
        mkdir -p output/zygisk
        cp module/libs/arm64-v8a/libbpm_injector.so output/zygisk/arm64-v8a.so
        cp module/module.prop output/ || true
        cp -r module/META-INF output/ || true
        cd output
        zip -r ../bpm-injector.zip ./*

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bpm-module
        path: bpm-injector.zip
